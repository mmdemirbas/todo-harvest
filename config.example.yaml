# todo-harvest configuration
# Copy this file to config.yaml and fill in your credentials.
# See README.md for detailed setup instructions for each service.
# Only configure the services you want to use — unconfigured ones are skipped.

output:
  dir: ./output

mapping:
  db_path: ./mapping.db

vikunja:
  base_url: "http://localhost:3456"
  api_token: "YOUR_API_TOKEN"
  # How to get: Vikunja UI → Settings → API Tokens → Create token

jira:
  base_url: "https://YOUR_SUBDOMAIN.atlassian.net"
  email: "your@email.com"
  api_token: "YOUR_API_TOKEN"
  # jql: "assignee = currentUser() ORDER BY created DESC"  # default
  # status_map:                    # override status name → unified status
  #   "Custom Status": "in_progress"
  # priority_map:                  # override priority name → unified priority
  #   "Custom Priority": "high"

mstodo:
  client_id: "YOUR_CLIENT_ID"
  # tenant_id: use "consumers" for personal Microsoft accounts
  tenant_id: "consumers"
  # How to get these: see README.md § Microsoft To Do credentials

notion:
  token: "YOUR_INTEGRATION_SECRET"
  database_ids:
    - "DATABASE_ID_1"
  # field_map:                     # map Notion column names → unified fields
  #   status: "Status"
  #   priority: "Priority"
  #   due_date: "Due Date"
  #   tags: "Tags"
  #   category: "Epic"
  #   description: "Notes"
  # status_map:
  #   "Custom Status": "in_progress"
  # priority_map:
  #   "Custom Priority": "high"
